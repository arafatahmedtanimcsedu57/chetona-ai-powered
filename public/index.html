<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>স্মার্ট মিরর</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="mode-morning">

  <!-- Splash Screen -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-glow"></div>
      <h1 class="splash-title">স্মার্ট মিরর</h1>
      <div class="splash-subtitle">প্রস্তুত হচ্ছে...</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <!-- Disconnected Banner -->
  <div id="disconnected-banner" class="disconnected-banner hidden">
    <span class="disconnect-pulse"></span>
    সংযোগ বিচ্ছিন্ন
  </div>

  <!-- Main Mirror Interface -->
  <main id="mirror" class="mirror hidden">

    <!-- Ambient Background Layer -->
    <div class="ambient-bg">
      <div class="ambient-orb ambient-orb-1"></div>
      <div class="ambient-orb ambient-orb-2"></div>
      <div class="ambient-orb ambient-orb-3"></div>
    </div>

    <!-- Grain Overlay -->
    <div class="grain-overlay"></div>

    <!-- Clock & Date — Top Center -->
    <header class="clock-section">
      <div class="clock-wrapper">
        <div id="clock" class="clock">০০:০০:০০</div>
        <div class="clock-reflection"></div>
      </div>
      <div id="date" class="date">—</div>
      <div id="location" class="location">
        <svg class="location-pin" viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        <span id="location-text"></span>
      </div>
    </header>

    <!-- Content Area — Weather + Calendar side by side -->
    <section class="content-area">

      <!-- Weather Panel -->
      <div id="weather-section" class="panel weather-panel">
        <div class="panel-glow"></div>
        <div class="panel-header">
          <div class="panel-icon-wrapper">
            <svg class="panel-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          </div>
          <span id="weather-label" class="panel-label">আবহাওয়া</span>
        </div>
        <div id="weather-content" class="panel-body">
          <div class="weather-hero">
            <div class="weather-temp-group">
              <span id="weather-temp" class="weather-temp">—</span>
              <span class="weather-unit">°সে</span>
            </div>
            <span id="weather-condition" class="weather-condition">—</span>
          </div>
          <div class="weather-grid">
            <div class="weather-stat">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">অনুভূত</span>
                <span id="weather-feels" class="stat-value">—</span>
              </div>
            </div>
            <div class="weather-stat">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">আর্দ্রতা</span>
                <span id="weather-humidity" class="stat-value">—</span>
              </div>
            </div>
            <div class="weather-stat">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">বাতাস</span>
                <span id="weather-wind" class="stat-value">—</span>
              </div>
            </div>
            <div class="weather-stat">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/>
                  <line x1="8" y1="16" x2="8.01" y2="21"/>
                  <line x1="12" y1="13" x2="12.01" y2="18"/>
                  <line x1="16" y1="16" x2="16.01" y2="21"/>
                </svg>
              </div>
              <div class="stat-content">
                <span class="stat-label">বৃষ্টি</span>
                <span id="weather-precip" class="stat-value">—</span>
              </div>
            </div>
          </div>
        </div>
        <div id="weather-stale" class="stale-indicator hidden"></div>
      </div>

      <!-- Calendar Panel -->
      <div id="calendar-section" class="panel calendar-panel">
        <div class="panel-glow"></div>
        <div class="panel-header">
          <div class="panel-icon-wrapper">
            <svg class="panel-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <span id="calendar-label" class="panel-label">আজকের সূচি</span>
        </div>
        <div id="calendar-content" class="panel-body">
          <ul id="calendar-events" class="event-list"></ul>
          <div id="calendar-empty" class="empty-state">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="9" y1="2" x2="9" y2="6"/>
              <line x1="15" y1="2" x2="15" y2="6"/>
            </svg>
            <span>কোনো ইভেন্ট নেই</span>
          </div>
        </div>
        <div id="calendar-stale" class="stale-indicator hidden"></div>
      </div>

    </section>

    <!-- AI Briefing -->
    <section id="briefing-section" class="briefing-section">
      <div class="briefing-wrapper">
        <div class="briefing-accent-line"></div>
        <div class="briefing-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div id="briefing-text" class="briefing-text"></div>
        <div class="briefing-accent-line"></div>
      </div>
      <div id="briefing-stale" class="stale-indicator hidden"></div>
    </section>

    <!-- RSS Feed Status -->
    <div id="feed-status" class="feed-status"></div>

    <!-- News Ticker — Bottom -->
    <footer class="ticker-section">
      <div class="ticker-line"></div>
      <div id="news-ticker" class="ticker">
        <span id="ticker-source" class="ticker-source"></span>
        <span class="ticker-divider">│</span>
        <span id="ticker-headline" class="ticker-headline">—</span>
      </div>
      <div id="news-stale" class="stale-indicator hidden"></div>
    </footer>

    <!-- Mode Switcher (demo only — remove in production) -->
    <div id="demo-switcher" class="demo-switcher hidden">
      <button data-mode="morning">সকাল</button>
      <button data-mode="afternoon">দুপুর</button>
      <button data-mode="evening">সন্ধ্যা</button>
      <button data-mode="night">রাত</button>
    </div>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
